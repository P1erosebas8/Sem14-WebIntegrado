    <ion-card-title>Resumen del registro</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <p><b>Nombre:</b> {{ registro.nombre }}</p>
    <p><b>Correo:</b> {{ registro.correo }}</p>
    <p><b>Tipo:</b> {{ registro.tipoApp }}</p>
  </ion-card-content>
</ion-card>
